<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIME SCENE - Evidence #01</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            /* 어두운 나무 책상 느낌의 배경 */
            background-image: 
                linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('https://www.transparenttextures.com/patterns/dark-wood.png');
            color: #e0e0e0;
            font-family: 'Nanum+Myeongjo', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .desk {
            position: relative;
            width: 100%;
            max-width: 900px;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 사진 프레임 (폴라로이드 느낌) */
        .evidence-photo {
            position: relative;
            background: #f4f4f4;
            padding: 15px 15px 60px 15px; /* 하단에 여백을 두어 메모 공간 확보 */
            box-shadow: 10px 15px 25px rgba(0,0,0,0.7);
            transform: rotate(-1.5deg); /* 살짝 기울여서 자연스럽게 */
            border-radius: 2px;
            max-width: 100%;
            transition: transform 0.3s ease;
        }

        .evidence-photo:hover {
            transform: rotate(0deg) scale(1.01);
        }

        .evidence-photo img {
            display: block;
            width: 100%;
            max-width: 750px;
            height: auto;
            border: 1px solid #ddd;
        }

        /* 테이프 효과 */
        .tape {
            position: absolute;
            width: 120px;
            height: 35px;
            background-color: rgba(220, 210, 180, 0.4);
            backdrop-filter: blur(1px);
            box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .tape-tl { top: -15px; left: -30px; transform: rotate(-45deg); border-left: 2px dashed rgba(0,0,0,0.05); border-right: 2px dashed rgba(0,0,0,0.05); }
        .tape-tr { top: -15px; right: -30px; transform: rotate(45deg); border-left: 2px dashed rgba(0,0,0,0.05); border-right: 2px dashed rgba(0,0,0,0.05); }

        /* 수사 스탬프 */
        .stamp {
            position: absolute;
            bottom: 80px;
            right: 30px;
            border: 4px double #9e1b11;
            color: #9e1b11;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 5px 15px;
            transform: rotate(-20deg);
            opacity: 0.7;
            user-select: none;
            pointer-events: none;
            font-family: sans-serif;
            letter-spacing: 2px;
            z-index: 5;
        }

        /* 하단 필기 메모 */
        .handwritten-note {
            position: absolute;
            bottom: 10px;
            left: 20px;
            font-family: 'Nanum Pen Script', cursive;
            font-size: 1.8rem;
            color: #333;
            letter-spacing: 1px;
        }

        /* 안내 문구 (포스트잇 느낌) */
        .instruction-tag {
            margin-top: 40px;
            background: #ebe085;
            color: #443;
            padding: 15px 25px;
            font-family: 'Nanum Pen Script', cursive;
            font-size: 1.6rem;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.3);
            transform: rotate(1deg);
            border-bottom-right-radius: 30px 5px;
            max-width: 300px;
            text-align: center;
        }

        .case-number {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.2);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="case-number">CASE FILE: #2026-0415-KB</div>

    <div class="desk">
        <div class="evidence-photo">
            <div class="tape tape-tl"></div>
            <div class="tape tape-tr"></div>
            
            <img src="전경비 문제 (카메라 가방).png" alt="Evidence #01">
            
            <div class="stamp">CONFIDENTIAL</div>
            
            <div class="handwritten-note">
                Evidence Log: 전경비 소지품함 주변에서 발견됨.
            </div>
        </div>

        <div class="instruction-tag">
            카메라 가방을 찾아서<br>자물쇠를 해제할 것.
        </div>
    </div>
</body>
</html>
